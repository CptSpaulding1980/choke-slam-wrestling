<style>
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0 }

    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;

  header { text-align: center; padding: 14px 0 8px; width: 100%; }

    font-size: clamp(1.1rem,2.5vw,1.7rem); letter-spacing: .12em;
    background: linear-gradient(90deg,#e63946,#f4a261,#e9c46a,#2a9d8f);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; text-transform: uppercase;
  }
  header p { font-size:.78rem; color:#888; margin-top:4px; letter-spacing:.05em; }
  #map-wrapper { position:relative; width:100%; max-width:1150px; }
  svg#map { width:100%; height:auto; display:block; border-radius:12px; box-shadow:0 0 60px #00000088; }
  .normal-region { transition:fill .25s,filter .25s; }
  .normal-region:hover { fill:#4a5490 !important; filter:brightness(1.3); cursor:pointer; }
  .org-region { transition:fill .25s,filter .25s; }
  .org-region:hover { filter:brightness(1.4) drop-shadow(0 0 8px currentColor); cursor:pointer; }
  @keyframes pulse { 0%{r:9;opacity:.8} 70%{r:22;opacity:0} 100%{r:9;opacity:0} }
  @keyframes pulse2 { 0%{r:9;opacity:.5} 70%{r:28;opacity:0} 100%{r:9;opacity:0} }
  .pulse-ring { animation: pulse 2s ease-out infinite; }
  .pulse-ring.delay { animation: pulse2 2s ease-out .6s infinite; }
  .marker-group { transition: filter .2s; }
  .marker-group:hover { filter: drop-shadow(0 0 10px white); }
  #info-card {
    position:fixed; pointer-events:none; z-index:999; width:320px;
    background:linear-gradient(145deg,#12122a,#1e1e42); border:1px solid #333;
    border-radius:14px; box-shadow:0 10px 40px #00000099,0 0 0 1px #ffffff11;
    opacity:0; transform:translateY(8px) scale(.97); transition:opacity .22s,transform .22s; overflow:hidden;
  }
  #info-card.visible { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .card-header { display:flex; align-items:center; gap:12px; padding:14px 16px 10px; border-bottom:1px solid #ffffff18; }
  .card-logo { width:56px; height:56px; border-radius:8px; background:#ffffff0f; border:1px dashed #ffffff33; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
  .card-logo img { width:100%; height:100%; object-fit:contain; display:none; }
  .card-logo .ph { font-size:.55rem; color:#666; text-align:center; line-height:1.3; padding:4px; }
  .card-title .abbr { font-size:.72rem; letter-spacing:.12em; font-weight:700; opacity:.8; }
  .card-title .full { font-size:.9rem; font-weight:700; line-height:1.25; margin-top:2px; }
  .card-body { padding:10px 16px 14px; font-size:.8rem; line-height:1.6; }
  .card-row { display:flex; gap:8px; margin-bottom:3px; }
  .card-row .lbl { color:#aaa; flex-shrink:0; width:82px; font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; padding-top:1px; }
  .card-row .val { color:#f0f0f0; }
  .card-note { margin-top:8px; padding-top:8px; border-top:1px solid #ffffff12; font-size:.74rem; color:#bbb; font-style:italic; line-height:1.5; white-space:pre-wrap; }
  .card-link { display:inline-block; margin-top:9px; padding:5px 14px; border-radius:20px; font-size:.73rem; font-weight:600; text-decoration:none; border:1px solid transparent; transition:filter .2s; }
  .card-link:hover { filter:brightness(1.2); }
  .md-box { margin-top:8px; padding:7px 10px; background:#ffffff09; border-radius:7px; font-size:.65rem; color:#888; line-height:1.6; }
  .md-box strong { color:#aaa; }
  .md-box code { background:#ffffff14; border-radius:3px; padding:1px 5px; font-family:monospace; font-size:.63rem; color:#ccc; display:inline-block; margin-top:2px; }
  #card-close { position:absolute; top:8px; right:10px; background:none; border:none; color:#888; font-size:1rem; cursor:pointer; line-height:1; transition:color .2s; pointer-events:auto; }
  #card-close:hover { color:#fff; }
  #legend { display:flex; flex-wrap:wrap; gap:10px 20px; justify-content:center; padding:10px 0 6px; width:100%; max-width:1150px; }
  .legend-item { display:flex; align-items:center; gap:7px; cursor:pointer; font-size:.78rem; color:#ccc; transition:color .2s; }
  .legend-item:hover { color:#fff; }
  .legend-dot { width:14px; height:14px; border-radius:50%; border:2px solid #fff4; flex-shrink:0; }
  .inset-label { fill:#aaa; font-size:9px; font-style:italic; pointer-events:none; }
  .country-label { fill:#ffffff28; font-size:11px; letter-spacing:.1em; text-transform:uppercase; pointer-events:none; }
</style>

<script>
document.addEventListener("DOMContentLoaded",function(){
const ORGS={"PWA":{"name":"Professional Wrestling Association","abbr":"PWA","color":"#e63946","hq":"Boston, Massachusetts","founded":"2018","style":"American Independent","championship":"PWA Heavyweight Championship","roster":"ca. 35 Wrestlers","website":"https://www.pwa-wrestling.com","note":"Eine der fuehrenden Independent-Promotions in Neuengland.","logo":"z_Images/PWA_1982-1989.png"},"CW":{"name":"Championship Wrestling","abbr":"CW","color":"#f4a261","hq":"Toronto, Ontario, Kanada","founded":"2010","style":"Canadian Style / Sports Entertainment","championship":"CW World Heavyweight Title","roster":"ca. 50 Wrestlers","website":"https://www.championshipwrestling.ca","note":"Groesste kanadische Wrestling-Promotion mit landesweiter TV-Praesenz.","logo":"z_Images/CWC.png"},"PNCW":{"name":"Pacific North Championship Wrestling","abbr":"PNCW","color":"#2a9d8f","hq":"San Francisco, Kalifornien","founded":"2015","style":"West Coast Lucha / Strong Style","championship":"PNCW Pacific Championship","roster":"ca. 40 Wrestlers","website":"https://www.pncw-wrestling.com","note":"Fusion aus Lucha Libre und Japanese Strong Style an der Westkueste.","logo":"z_Images/PNCW.png"},"AULL":{"name":"Asociacion Universal de Lucha Libre","abbr":"AULL","color":"#e9c46a","hq":"Ciudad de Mexico, Mexiko","founded":"1981","style":"Lucha Libre","championship":"AULL World Title","roster":"ca. 200 Luchadores","website":"https://www.aull-luchalibre.mx","note":"Traditionelle mexikanische Lucha-Libre-Organisation mit jahrzehntelanger Geschichte.","logo":"z_Images/AULL.png"}};
const card=document.getElementById("info-card"),close=document.getElementById("card-close");
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function posCard(e){const m=14,cw=card.offsetWidth||320,ch=card.offsetHeight||300;let cx=e.clientX+20,cy=e.clientY+20;if(cx+cw>window.innerWidth-m)cx=e.clientX-cw-12;if(cy+ch>window.innerHeight-m)cy=e.clientY-ch-12;if(cx<m)cx=m;if(cy<m)cy=m;card.style.left=cx+"px";card.style.top=cy+"px"}
function showCard(id,e){const o=ORGS[id];if(!o)return;document.getElementById("card-abbr").textContent=o.abbr;document.getElementById("card-full").textContent=o.name;document.getElementById("c-hq").textContent=o.hq;document.getElementById("c-founded").textContent=o.founded;document.getElementById("c-style").textContent=o.style;document.getElementById("c-champ").textContent=o.championship;document.getElementById("c-roster").textContent=o.roster;document.getElementById("c-note").textContent=o.note;card.style.borderColor=o.color+"55";document.querySelector(".card-header").style.borderBottomColor=o.color+"33";document.getElementById("card-abbr").style.color=o.color;document.getElementById("card-full").style.color=o.color;const lnk=document.getElementById("c-link");lnk.href=o.website;lnk.style.cssText="background:"+o.color+"22;border-color:"+o.color+"88;color:"+o.color;const img=document.getElementById("card-logo-img"),ph=document.getElementById("card-logo-ph");img.src=o.logo;img.onload=function(){img.style.display="block";ph.style.display="none"};img.onerror=function(){img.style.display="none";ph.style.display="block"};img.style.display="none";ph.style.display="block";const mdBox=document.getElementById("c-md");mdBox.innerHTML="<strong>Obsidian-Links:</strong><br><code>[["+esc(o.abbr)+"]]</code><br><code>["+esc(o.name)+"]("+esc(o.website)+")</code>";posCard(e);card.classList.add("visible")}
function hideCard(){card.classList.remove("visible");delete card.dataset.pinned}
document.querySelectorAll(".org-region").forEach(function(el){el.addEventListener("mousemove",function(e){if(!card.dataset.pinned)showCard(el.dataset.org,e)});el.addEventListener("mouseleave",function(){if(!card.dataset.pinned)hideCard()});el.addEventListener("click",function(e){card.dataset.pinned="1";showCard(el.dataset.org,e)})});
document.querySelectorAll(".marker-group").forEach(function(el){el.addEventListener("mousemove",function(e){if(!card.dataset.pinned)showCard(el.dataset.org,e)});el.addEventListener("mouseleave",function(){if(!card.dataset.pinned)hideCard()});el.addEventListener("click",function(e){e.stopPropagation();var same=card.dataset.pinned&&document.getElementById("card-abbr").textContent===(ORGS[el.dataset.org]||{}).abbr;if(same){hideCard()}else{card.dataset.pinned="1";showCard(el.dataset.org,e)}})});
document.querySelectorAll(".legend-item").forEach(function(el){el.addEventListener("click",function(){document.querySelectorAll("[data-org=""+el.dataset.org+""]").forEach(function(r){r.style.filter="brightness(2.2) drop-shadow(0 0 14px white)";setTimeout(function(){r.style.filter=""},900)})})});
close.addEventListener("click",hideCard);
document.addEventListener("click",function(e){if(!card.contains(e.target)&&!e.target.closest(".org-region,.marker-group"))hideCard()});
document.addEventListener("mousemove",function(e){if(card.classList.contains("visible")&&!card.dataset.pinned)posCard(e)});
});
